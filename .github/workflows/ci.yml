name: CI
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install core build tools
      run: |
        wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | sudo tee /etc/apt/trusted.gpg.d/kitware.gpg >/dev/null
        sudo apt-add-repository "deb https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main" -y
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build build-essential python3-pip clang
        pip3 install conan
    
    - name: Get Conan version
      id: conan-version
      run: echo "version=$(conan --version | grep -oP '(?<=Conan version )[0-9]+\.[0-9]+\.[0-9]+')" >> $GITHUB_OUTPUT
    
    - name: Cache Conan packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.conan2/p
          ~/.conan2/cache
        key: ${{ runner.os }}-conan-${{ steps.conan-version.outputs.version }}-${{ hashFiles('**/conanfile.py') }}
        restore-keys: |
          ${{ runner.os }}-conan-${{ steps.conan-version.outputs.version }}-
    
    - name: Configure Conan
      run: |
        conan --version
        conan profile detect --force
    
    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}-
    
    # This step ensures vulkan package headers are in place before running the build script
    - name: Prepare Vulkan Dependencies
      run: |
        # Run conan install separately to ensure Vulkan packages are available
        mkdir -p build/Debug
        cd build/Debug
        conan install ../.. --build=missing
        
        # Find and display vulkan headers from Conan
        VULKAN_HEADERS_PATH=$(find ~/.conan2/p -name "vulkan" -type d | grep include)
        echo "Found Vulkan headers at: $VULKAN_HEADERS_PATH"
        if [ -n "$VULKAN_HEADERS_PATH" ]; then
          ls -la $VULKAN_HEADERS_PATH
          echo "VULKAN_HEADERS_PATH=$VULKAN_HEADERS_PATH" >> $GITHUB_ENV
        else
          echo "Vulkan headers not found in Conan packages!"
        fi
    
    - name: Build Debug
      run: |
        # Make build scripts executable
        chmod +x ./build_and_run.sh
        chmod +x ./coverage.sh
        
        # Export Vulkan headers location to help the build find them
        if [ -n "$VULKAN_HEADERS_PATH" ]; then
          export CPATH=$VULKAN_HEADERS_PATH:$CPATH
          export C_INCLUDE_PATH=$VULKAN_HEADERS_PATH:$C_INCLUDE_PATH
          export CPLUS_INCLUDE_PATH=$VULKAN_HEADERS_PATH:$CPLUS_INCLUDE_PATH
        fi
        
        # Run the build with extra verbosity
        ./build_and_run.sh --debug --no-run --verbose
    
    - name: Run Tests
      run: ./build_and_run.sh --test
