name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | sudo tee /etc/apt/trusted.gpg.d/kitware.gpg >/dev/null
        sudo apt-add-repository "deb https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main" -y
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build build-essential python3-pip clang 
        # sudo apt-get install -y libgl-dev libgl1-mesa-dev \
        #   libx11-dev libx11-xcb-dev libfontenc-dev libice-dev libsm-dev libxau-dev libxaw7-dev \
        #   libxcomposite-dev libxcursor-dev libxdamage-dev libxfixes-dev libxi-dev libxinerama-dev \
        #   libxkbfile-dev libxmuu-dev libxrandr-dev libxres-dev libxss-dev libxtst-dev libxv-dev \
        #   libxxf86vm-dev libxcb-glx0-dev libxcb-render-util0-dev libxcb-xkb-dev libxcb-icccm4-dev \
        #   libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-sync-dev \
        #   libxcb-xfixes0-dev libxcb-util-dev libxcb-util0-dev libxcb-xinerama0-dev libxcb-dri3-dev libxcb-cursor-dev libxcb-dri2-0-dev \
        #   libxcb-present-dev libxcb-composite0-dev libxcb-ewmh-dev libxcb-res0-dev
        pip3 install conan
    
    - name: Configure Conan
      run: |
        conan --version
        conan profile detect --force
    
    - name: Build Debug
      run: |
        # Make build scripts executable
        chmod +x ./build_and_run.sh
        chmod +x ./coverage.sh
        
        # Needs to match exactly with the CMakePresets.json
        mkdir -p build/Debug
        
        ./build_and_run.sh --debug --no-run
    
    - name: Run Tests
      run: ./build_and_run.sh --test
