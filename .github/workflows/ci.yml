name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential python3-pip clang libgl-dev libgl1-mesa-dev \
          libx11-dev libx11-xcb-dev libfontenc-dev libice-dev libsm-dev libxau-dev libxaw7-dev \
          libxcomposite-dev libxcursor-dev libxdamage-dev libxfixes-dev libxi-dev libxinerama-dev \
          libxkbfile-dev libxmuu-dev libxrandr-dev libxres-dev libxss-dev libxtst-dev libxv-dev \
          libxxf86vm-dev libxcb-glx0-dev libxcb-render-util0-dev libxcb-xkb-dev libxcb-icccm4-dev \
          libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-sync-dev \
          libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-dri3-dev libxcb-cursor-dev libxcb-dri2-0-dev \
          libxcb-present-dev libxcb-composite0-dev libxcb-ewmh-dev libxcb-res0-dev
        pip3 install conan==2.0.17
    
    - name: Configure Conan
      run: |
        conan --version
        conan profile detect --force
        # Configure Conan to install system packages
        mkdir -p ~/.conan2
        echo "[conf]" > ~/.conan2/global.conf
        echo "tools.system.package_manager:mode=install" >> ~/.conan2/global.conf
    
    - name: Build Debug
      run: |
        # Make build scripts executable
        chmod +x ./build_and_run.sh
        chmod +x ./coverage.sh
        
        # For running in CI environment, add these to avoid GLFW/X11 errors
        mkdir -p ~/.conan2
        echo "[conf]" > ~/.conan2/global.conf
        echo "tools.system.package_manager:mode=install" >> ~/.conan2/global.conf
        echo "*:glfw:shared=False" >> ~/.conan2/global.conf
        echo "*:glfw:vulkan_static=True" >> ~/.conan2/global.conf
        
        # Needs to match exactly with the CMakePresets.json
        mkdir -p build/Debug
        
        ./build_and_run.sh --debug --no-run
    
    # - name: Run Tests
    #   run: ./build_and_run.sh --test
