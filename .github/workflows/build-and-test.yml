name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  setup:
    name: Setup Build Environment
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        build_type: [Debug, Release]
        compiler: [clang]
        include:
          - os: ubuntu-latest
            compiler: clang
            cpp_compiler: clang++-16
            c_compiler: clang-16

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          pip install conan
          # Create default Conan profile to avoid the common error in CI environments
          conan profile detect --force

      - name: Install Vulkan SDK
        if: runner.os == 'Linux'
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install -y vulkan-sdk

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Add LLVM 16 repository for newer Clang with better C++20 support
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-16 main"
          sudo apt-get update
          
          # Install essential build tools and CMake first
          sudo apt-get install -y build-essential cmake ninja-build pkg-config
          # Install newer Clang with better C++20 support
          sudo apt-get install -y clang-16 clang-tools-16 clang-tidy-16
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-16 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-16 100
          
          # Install C++ compiler toolchain
          sudo apt-get install -y libc++-16-dev libc++abi-16-dev
          # Install spdlog and other dependencies
          sudo apt-get install -y libspdlog-dev libfmt-dev
          # Install X11 development libraries needed for GLFW
          sudo apt-get install -y libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
          libx11-dev libx11-xcb-dev libfontenc-dev libice-dev libsm-dev libxau-dev libxaw7-dev \
          libxcomposite-dev libxdamage-dev libxkbfile-dev libxmu-dev libxmuu-dev libxpm-dev libxres-dev \
          libxss-dev libxtst-dev libxv-dev libxxf86vm-dev
          # Install XCB development libraries
          sudo apt-get install -y libxcb-glx0-dev libxcb-render-util0-dev libxcb-xkb-dev libxcb-icccm4-dev \
          libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-sync-dev \
          libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-dri3-dev libxcb-cursor-dev libxcb-dri2-0-dev \
          libxcb-present-dev libxcb-composite0-dev libxcb-ewmh-dev libxcb-res0-dev

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('**/conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Create artifacts directory for compilation database
        run: mkdir -p artifacts

      - name: Configure and Build
        run: |
          mkdir -p build
          cd build
          
          # Set compiler
          export CC=clang-16
          export CXX=clang++-16
          
          # Create custom Conan profile
          cat > custom_profile << EOF
          [settings]
          arch=x86_64
          build_type=${{ matrix.build_type }}
          compiler=clang
          compiler.version=16
          compiler.libcxx=libstdc++11
          compiler.cppstd=20
          os=Linux
          
          [conf]
          tools.build:compiler_executables={"c": "clang-16", "cpp": "clang++-16"}
          tools.cmake.cmaketoolchain:generator=Ninja
          tools.system.package_manager:mode=install
          EOF
          
          # Display profiles for debugging
          echo "Available Conan profiles:"
          conan profile list
          
          # Check that required tools are installed
          cmake --version
          clang-16 --version
          clang++-16 --version
          ninja --version
          
          # Install spdlog and other missing dependencies directly
          sudo apt-get install -y libspdlog-dev
          
          # Install dependencies with Conan (with verbose output for debugging)
          conan install .. --build=missing -g CMakeDeps -g CMakeToolchain -pr=custom_profile -s build_type=${{ matrix.build_type }} -v
          
          # List generated files in build directory and its subdirectories
          echo "Generated files in the build directory:"
          find . -type f -name "conan_toolchain.cmake" | sort
          
          # Now find the toolchain file path
          TOOLCHAIN_PATH=$(find . -name "conan_toolchain.cmake" | head -n 1)
          if [ -z "$TOOLCHAIN_PATH" ]; then
            echo "ERROR: Could not find Conan-generated toolchain file"
            exit 1
          fi
          
          echo "Found toolchain at: $TOOLCHAIN_PATH"
          
          # Use the found toolchain file to configure CMake
          cmake .. -G Ninja -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_PATH" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_CXX_COMPILER=clang++-16 -DCMAKE_C_COMPILER=clang-16 -DKST_BUILD_TESTS=ON
          
          # Build the project
          cmake --build . --config ${{ matrix.build_type }}
          
          # Copy compile_commands.json for analysis
          if [ -f compile_commands.json ]; then
            cp compile_commands.json ../artifacts/
          fi

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure -C ${{ matrix.build_type }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: artifacts/
          retention-days: 7

  coverage:
    name: Generate Coverage Report
    needs: [setup]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Conan and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install conan
          # Create default Conan profile to avoid the common error in CI environments
          conan profile detect --force
          
          # Add LLVM 16 repository for newer Clang with better C++20 support
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-16 main"
          sudo apt-get update
          
          # Install essential build tools and dependencies for coverage job
          sudo apt-get install -y build-essential cmake ninja-build pkg-config
          # Install newer Clang with better C++20 support
          sudo apt-get install -y clang-16 clang-tools-16 clang-tidy-16
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-16 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-16 100
          
          # Install C++ compiler toolchain
          sudo apt-get install -y libc++-16-dev libc++abi-16-dev
          
          # Install spdlog and other system dependencies
          sudo apt-get install -y libspdlog-dev
          
          # Install X11 development libraries needed for GLFW
          sudo apt-get install -y libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
          libx11-dev libx11-xcb-dev libfontenc-dev libice-dev libsm-dev libxau-dev libxaw7-dev \
          libxcomposite-dev libxdamage-dev libxkbfile-dev libxmu-dev libxmuu-dev libxpm-dev \
          libxres-dev libxss-dev libxtst-dev libxv-dev libxxf86vm-dev
          
          # Install XCB development libraries
          sudo apt-get install -y libxcb-glx0-dev libxcb-render-util0-dev libxcb-xkb-dev \
          libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev \
          libxcb-shape0-dev libxcb-sync-dev libxcb-xfixes0-dev libxcb-xinerama0-dev \
          libxcb-dri3-dev libxcb-cursor-dev libxcb-dri2-0-dev libxcb-present-dev \
          libxcb-composite0-dev libxcb-ewmh-dev libxcb-res0-dev

      - name: Install Vulkan SDK
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install -y vulkan-sdk

      - name: Install LLVM Tools for Coverage
        run: |
          sudo apt-get install -y llvm-16 llvm-16-dev
          # Create symlinks to make the coverage tools easier to use
          sudo ln -sf /usr/bin/llvm-profdata-16 /usr/bin/llvm-profdata
          sudo ln -sf /usr/bin/llvm-cov-16 /usr/bin/llvm-cov

      - name: Configure and Build with Coverage
        run: |
          mkdir -p build
          cd build
          
          # Set compiler
          export CC=clang-16
          export CXX=clang++-16
          
          # Create custom Conan profile for coverage build
          cat > custom_profile << EOF
          [settings]
          arch=x86_64
          build_type=Debug
          compiler=clang
          compiler.version=16
          compiler.libcxx=libstdc++11
          compiler.cppstd=20
          os=Linux
          
          [conf]
          tools.build:compiler_executables={"c": "clang-16", "cpp": "clang++-16"}
          tools.cmake.cmaketoolchain:generator=Ninja
          tools.system.package_manager:mode=install
          EOF
          
          # Check that required tools are installed
          cmake --version
          clang-16 --version
          clang++-16 --version
          ninja --version
          
          # Install spdlog and other missing dependencies directly
          sudo apt-get install -y libspdlog-dev
          
          # Install dependencies with Conan (with verbose output for debugging)
          conan install .. --build=missing -g CMakeDeps -g CMakeToolchain -pr=custom_profile -s build_type=Debug -v
          
          # List generated files in build directory and its subdirectories
          echo "Generated files in the build directory:"
          find . -type f -name "conan_toolchain.cmake" | sort
          
          # Now find the toolchain file path
          TOOLCHAIN_PATH=$(find . -name "conan_toolchain.cmake" | head -n 1)
          if [ -z "$TOOLCHAIN_PATH" ]; then
            echo "ERROR: Could not find Conan-generated toolchain file"
            exit 1
          fi
          
          echo "Found toolchain at: $TOOLCHAIN_PATH"
          
          # Use the found toolchain file to configure CMake
          cmake .. -G Ninja -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_PATH" -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++-16 -DCMAKE_C_COMPILER=clang-16 -DKST_BUILD_TESTS=ON -DKST_BUILD_COVERAGE=ON
          
          # Build
          cmake --build .

      - name: Run Tests with Coverage
        run: |
          cd build
          LLVM_PROFILE_FILE="$(pwd)/default.profraw" ctest --output-on-failure
          
          # Process coverage data
          if [ -f default.profraw ]; then
            llvm-profdata merge -sparse default.profraw -o default.profdata
            
            # Find the test executable
            TEST_EXEC=$(find . -name "konstrukt_tests" -type f -executable)
            
            # Generate coverage report
            mkdir -p coverage_report
            llvm-cov show "$TEST_EXEC" -instr-profile=default.profdata \
                    -ignore-filename-regex=".*tests/.*" \
                    --format=html > coverage_report/index.html
            
            # Generate coverage data in LCOV format for potential upload to coverage services
            llvm-cov export "$TEST_EXEC" -instr-profile=default.profdata \
                    -ignore-filename-regex=".*tests/.*" \
                    -format=lcov > coverage.lcov
            
            # Print coverage summary
            llvm-cov report "$TEST_EXEC" -instr-profile=default.profdata \
                    -ignore-filename-regex=".*tests/.*"
          fi

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            build/coverage_report/
            build/coverage.lcov
          retention-days: 7

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Clang Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-16 clang-tools-16 clang-tidy-16 clang-format-16

      - name: Download Compile Commands
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-ubuntu-latest-clang-Debug
          path: artifacts

      - name: Run Clang-Tidy
        run: |
          if [ -f artifacts/compile_commands.json ]; then
            cp artifacts/compile_commands.json .
            find source -name "*.cpp" -o -name "*.hpp" | xargs -I{} clang-tidy-16 -p . {}
          else
            echo "No compile_commands.json found, skipping clang-tidy"
          fi

      - name: Check Clang-Format
        run: |
          find source tests -name "*.cpp" -o -name "*.hpp" | xargs clang-format-16 --dry-run -Werror
